<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Пользователи — Dev Dashboard</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<div class="app">
<div class="header">
<div class="header-top">
<div>
<h1>Пользователи</h1>
<p class="subtitle">Админ-панель Dev Dashboard.</p>
</div>

<div class="user-panel">
<a class="panel-link" href="/">Dashboard</a>
<button onclick="logout()">Выйти</button>
</div>
</div>
</div>

<div class="admin-card">
<h2>Список пользователей</h2>
<div id="users"></div>
</div>
</div>

<script>
function loadUsers() {
fetch("/api/admin/users")
.then(response => response.json().then(data => ({ ok: response.ok, data })))
.then(result => {
if (!result.ok) {
document.getElementById("users").innerHTML = "<p class='auth-error'>" + (result.data.error || "Ошибка") + "</p>";
return;
}

const users = result.data;

document.getElementById("users").innerHTML = users.map(user =>
"<div class='user-row'>" +
"<div>" +
"<b>#" + user.id + " " + user.username + "</b>" +
"<br><span>Роль: " + user.role + "</span>" +
"<br><span>Создан: " + user.created_at + "</span>" +
"</div>" +
"<button class='delete-btn' onclick='deleteUser(" + user.id + ")'>Удалить</button>" +
"</div>"
).join("");
});
}

function deleteUser(id) {
if (!confirm("Удалить пользователя #" + id + "?")) {
return;
}

fetch("/api/admin/users/" + id, {
method: "DELETE"
})
.then(response => response.json().then(data => ({ ok: response.ok, data })))
.then(result => {
if (!result.ok) {
alert(result.data.error || "Ошибка удаления");
return;
}

loadUsers();
});
}

function logout() {
fetch("/api/logout", {
method: "POST"
}).then(() => {
window.location.href = "/login";
});
}

loadUsers();
</script>
</body>
</html>
