<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Dev Dashboard</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<div class="app">
<div class="header">
<div class="header-top">
<div>
<h1>Dev Dashboard</h1>
<p class="subtitle">Мини-доска задач на Go + Gin + PostgreSQL.</p>
</div>

<div id="user-panel" class="user-panel"></div>
</div>
</div>

<div class="workspace-panel">
<div>
<label class="workspace-label">Рабочая область</label>
<select id="workspaceSelect" onchange="changeWorkspace()"></select>
</div>

<div class="workspace-actions">
<button onclick="createWorkspace()">Создать область</button>
<button onclick="toggleMembersPanel()">Участники</button>
</div>
</div>

<div id="membersPanel" class="members-panel hidden">
<div class="members-header">
<h2>Участники рабочей области</h2>
<p>Добавляй пользователей по логину. Участник увидит эту рабочую область у себя.</p>
</div>

<div class="members-add">
<input id="memberUsername" placeholder="Логин пользователя" />

<select id="memberRole">
<option value="member">member</option>
<option value="owner">owner</option>
</select>

<button onclick="addWorkspaceMember()">Добавить</button>
</div>

<div id="membersList"></div>
</div>

<div class="form">
<input id="title" placeholder="Новая задача" />

<select id="status">
<option value="todo">todo</option>
<option value="in_progress">in_progress</option>
<option value="done">done</option>
</select>

<select id="priority">
<option value="low">low</option>
<option value="medium" selected>medium</option>
<option value="high">high</option>
</select>

<input id="deadline" type="date" class="date-input" />

<button onclick="createTask()">Добавить</button>
</div>

<div class="search-panel">
<input id="search" class="search-input" placeholder="Поиск задачи..." oninput="renderTasks()" />

<select id="priorityFilter" class="filter-select" onchange="renderTasks()">
<option value="all">Все приоритеты</option>
<option value="low">low</option>
<option value="medium">medium</option>
<option value="high">high</option>
</select>
</div>

<div class="board">
<div class="column">
<h2>TODO <span class="counter" id="todo-count"></span></h2>
<div id="todo"></div>
</div>

<div class="column">
<h2>IN PROGRESS <span class="counter" id="in_progress-count"></span></h2>
<div id="in_progress"></div>
</div>

<div class="column">
<h2>DONE <span class="counter" id="done-count"></span></h2>
<div id="done"></div>
</div>
</div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
